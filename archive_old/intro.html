<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>STEM Nation — Introduction</title>
</head>

<body style="
margin:0;
background:black;
color:white;
font-family:Segoe UI, Arial, sans-serif;
overflow:hidden;
">

<!-- BACKGROUND -->
<img id="bg" src="./intro_scene1.png"
style="
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
opacity:0;
transition:opacity 2s;
z-index:0;
">

<!-- OVERLAY -->
<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:1;
"></div>

<!-- TEXT -->
<div id="text" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
font-size:36px;
text-align:center;
max-width:900px;
opacity:0;
transition:opacity 1.8s;
z-index:2;
line-height:1.5;
">
</div>

<!-- CONTINUE -->
<button id="continueBtn" onclick="nextPage()" style="
position:absolute;
bottom:30px;
right:30px;
padding:14px 24px;
font-size:18px;
background:white;
border:none;
border-radius:8px;
cursor:pointer;
display:none;
z-index:3;
">
Continue
</button>

<script>

const sequence = [
{
text: "Every civilization begins with a decision.",
img: "intro_scene1.png"
},
{
text: "Not with answers...<br>but with questions.",
img: "intro_scene2.jpg"
},
{
text: "The quality of those questions<br>shapes everything that follows.",
img: "intro_scene3.jpg"
},
{
text: "In this system,<br>you will learn to observe<br>before you act.",
img: "intro_scene4.jpg"
},
{
text: "To think<br>before you decide.",
img: "intro_scene5.jpg"
}
];

let index = 0;
const textDiv = document.getElementById("text");
const bg = document.getElementById("bg");

function showNext() {

if (index < sequence.length) {

  textDiv.style.opacity = 0;
  bg.style.opacity = 0;

  setTimeout(() => {

    textDiv.innerHTML = sequence[index].text;
    bg.src = sequence[index].img;

    bg.style.opacity = 1;
    textDiv.style.opacity = 1;

    index++;

    setTimeout(showNext, 4000);

  }, 800);

} else {

  textDiv.style.opacity = 0;

  setTimeout(() => {
    document.getElementById("continueBtn").style.display = "block";
  }, 1200);
}
}

showNext();

function nextPage() {
window.location.href = "world_select.html";
}

</script>

</body>
</html>
