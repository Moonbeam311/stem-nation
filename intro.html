<!DOCTYPE html>
<html>
<head>
<title>STEM Nation — Intro</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  overflow:hidden;
}

h1 {
  font-size:48px;
  margin-top:20vh;
  opacity:0;
  transition:opacity 2s;
}

#text {
  font-size:28px;
  margin-top:20px;
  opacity:0;
  transition:opacity 1.5s;
}

button {
  margin-top:40px;
  font-size:20px;
  padding:12px 20px;
  opacity:0;
  transition:opacity 2s;
}
</style>

</head>

<body>

<h1 id="title">STEM Nation</h1>

<p id="text"></p>

<button id="startBtn" onclick="startIntro()">▶ Begin Experience</button>



<script>
let lines = [
  "Civilization did not begin with us...",
  "But it will be shaped by us.",
  "Every decision carries consequence.",
  "Welcome to STEM Nation."
];

let i = 0;
let selectedVoice = null;

function loadVoice() {
  const voices = speechSynthesis.getVoices();

  // PRIORITY: deeper, more stable voices
  selectedVoice =
    voices.find(v => v.name.includes("David")) ||
    voices.find(v => v.name.includes("Google UK English Male")) ||
    voices.find(v => v.name.includes("Microsoft Mark")) ||
    voices[0];
}

speechSynthesis.onvoiceschanged = loadVoice;

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  msg.rate = 0.75;   // slower (more authority)
  msg.pitch = 0.7;   // deeper tone
  msg.volume = 1;

  if (selectedVoice) {
    msg.voice = selectedVoice;
  }

  speechSynthesis.speak(msg);
}

function fadeIn(el) {
  el.style.opacity = 1;
}

function showLine() {
  const text = document.getElementById("text");

  if (i < lines.length) {
    text.style.opacity = 0;

    setTimeout(() => {
      text.innerText = lines[i];
      text.style.opacity = 1;

      speak(lines[i]);

      i++;
      setTimeout(showLine, 4500);
    }, 1000);

  } else {
    setTimeout(() => {
      window.location.href = "https://stem-nation.onrender.com/";
    }, 3000);
  }
}

function startIntro() {
  document.getElementById("startBtn").style.display = "none";
  showLine();
}

window.onload = () => {
  loadVoice();

  fadeIn(document.getElementById("title"));

  setTimeout(() => {
    fadeIn(document.getElementById("startBtn"));
  }, 2000);
};
</script>



</body>
</html>
