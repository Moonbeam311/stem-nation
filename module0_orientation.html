<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>STEM Nation — Orientation</title>
</head>

<body style="
margin:0;
display:flex;
font-family:Segoe UI, Arial;
height:100vh;
overflow:hidden;
">

<!-- MAP AREA -->
<div style="flex:3; height:100vh;">

<img src="/orientation_map.png"
style="
width:100%;
height:100%;
object-fit:cover;
display:block;
">

</div>

<!-- PANEL -->
<div style="
flex:1;
background:#111;
color:white;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
">

<div>
<div style="font-size:22px; margin-bottom:10px;">
Where would movement be most difficult?
</div>

<div style="font-size:14px; color:#cbbda2; margin-bottom:15px;">
Look for terrain that slows, blocks, or complicates movement.
</div>

<textarea id="response" placeholder="Explain your reasoning..."
style="
width:100%;
height:150px;
font-size:16px;
padding:10px;
border:none;
border-radius:6px;
resize:none;
">
</textarea>

<div id="status" style="font-size:14px; margin-top:8px; color:#aaa;"></div>
</div>

<div style="display:flex; gap:10px;">

<button onclick="skip()" style="
flex:1;
padding:12px;
font-size:16px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">
Skip
</button>

<button onclick="saveAndContinue()" style="
flex:1;
padding:12px;
font-size:16px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
">
Continue
</button>

</div>

</div>

<script>

function saveAndContinue() {
  const text = document.getElementById("response").value;

  localStorage.setItem("orientation_response", text);

  document.getElementById("status").innerText = "✓ Response saved";

  setTimeout(() => {
    window.location.href = "/module0_resources.html";
  }, 300);
}

function skip() {
  window.location.href = "/module0_resources.html";
}

</script>

</body>
</html>
