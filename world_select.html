<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEM Nation — World Select</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #111;
      color: #f2efe6;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 24px;
      background:
        linear-gradient(rgba(10,10,10,0.78), rgba(10,10,10,0.78)),
        radial-gradient(circle at top, rgba(120,90,45,0.18), transparent 45%),
        #111;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .title {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 0.04em;
      margin: 10px 0 8px;
    }

    .subtitle {
      text-align: center;
      color: #cbbda2;
      margin: 0 0 28px;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 20px;
    }

    .world-card {
      position: relative;
      border: 1px solid rgba(210, 184, 140, 0.24);
      overflow: hidden;
      cursor: pointer;
      background: #1a1a1a;
      min-height: 250px;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .world-card:hover {
      transform: translateY(-2px);
      border-color: rgba(210, 184, 140, 0.5);
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .world-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      filter: saturate(0.9) contrast(1.02) brightness(0.9);
    }

    .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.82));
      font-size: 1.05rem;
      letter-spacing: 0.03em;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(240px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
      body { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Choose Your World</div>
    <div class="subtitle">Where you begin shapes what you notice first.</div>

    <div class="grid">
      <div class="world-card" onclick="chooseWorld('river')">
        <img src="river.png" alt="River world">
        <div class="label">River</div>
      </div>

      <div class="world-card" onclick="chooseWorld('forest')">
        <img src="forestt.jpg" alt="Forest world">
        <div class="label">Forest</div>
      </div>

      <div class="world-card" onclick="chooseWorld('mountain')">
        <img src="world_mountain.jpg" alt="Mountain world">
        <div class="label">Mountain</div>
      </div>

      <div class="world-card" onclick="chooseWorld('desert')">
        <img src="desert.jpg" alt="Desert world">
        <div class="label">Desert</div>
      </div>

      <div class="world-card" onclick="chooseWorld('coastal')">
        <img src="coastal.jpg" alt="Coastal world">
        <div class="label">Coastal</div>
      </div>

      <div class="world-card" onclick="chooseWorld('balanced')">
        <img src="balanced.jpg" alt="Balanced world">
        <div class="label">Balanced</div>
      </div>
    </div>
  </div>

  <script>
    function chooseWorld(world) {
      localStorage.setItem("selectedWorld", world);
      window.location.href = "module0.html";
    }
  </script>
</body>
</html>
