<!DOCTYPE html>
<html>
<head>
  <title>Nation Builder Cinematic</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      color: white;
      cursor: pointer;
    }

    .camera {
      position: absolute;
      inset: -5%;
      background: url('/static/intro_scene3.jpg') center center / cover no-repeat;
      animation: slowCamera 9s ease-in-out forwards;
      transform-origin: center;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.08), rgba(0,0,0,0.45)),
        linear-gradient(to top, rgba(0,0,0,0.86), rgba(0,0,0,0.18), rgba(0,0,0,0.4));
      z-index: 1;
    }

    .text {
      position: absolute;
      left: 50%;
      bottom: 120px;
      transform: translateX(-50%);
      z-index: 2;
      width: min(940px, 86vw);
      font-size: clamp(28px, 4.3vw, 48px);
      line-height: 1.26;
      text-align: center;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 1.8s ease;
      text-shadow: 0 4px 22px rgba(0,0,0,0.95);
    }

    .skip {
      position: absolute;
      right: 26px;
      bottom: 24px;
      z-index: 3;
      padding: 9px 16px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      background: rgba(0,0,0,0.32);
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1.5s ease, background 0.2s ease;
    }

    .skip:hover {
      background: rgba(212,175,55,0.82);
      color: black;
    }

    .audio-note {
      position: absolute;
      left: 24px;
      bottom: 28px;
      z-index: 3;
      font-size: 11px;
      opacity: 0;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: opacity 1.5s ease;
    }

    @keyframes slowCamera {
      0% {
        transform: scale(1.035) translate3d(-1.0%, 0.4%, 0);
      }
      50% {
        transform: scale(1.08) translate3d(1.0%, -0.5%, 0);
      }
      100% {
        transform: scale(1.12) translate3d(0.3%, -1.0%, 0);
      }
    }
  </style>
</head>

<body>
  <div class="scene" onclick="startAudio()">
    <div class="camera"></div>
    <div class="shade"></div>

    <div id="text" class="text">The quality of those questions
shapes everything that follows.</div>

    <button id="skip" class="skip" onclick="skipNext(event)">Skip</button>
    <div id="audioNote" class="audio-note">Tap screen if audio is blocked</div>

    <audio id="audio" preload="auto">
      <source src="/static/intro3.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const textEl = document.getElementById("text");
    const skipEl = document.getElementById("skip");
    const audioNoteEl = document.getElementById("audioNote");
    const audioEl = document.getElementById("audio");

    let audioStarted = false;

    function startAudio() {
      if (audioStarted) return;
      audioStarted = true;
      audioEl.volume = 0.68;
      audioEl.play().then(() => {
        audioNoteEl.style.opacity = 0;
      }).catch(() => {
        audioStarted = false;
        audioNoteEl.style.opacity = 0.55;
      });
    }

    function goNext() {
      window.location.href = "/intro4";
    }

    function skipNext(event) {
      if (event) event.stopPropagation();
      goNext();
    }

    window.addEventListener("load", () => {
      startAudio();

      setTimeout(() => {
        textEl.style.opacity = 1;
      }, 1400);

      setTimeout(() => {
        skipEl.style.opacity = 0.45;
      }, 2800);

      setTimeout(() => {
        textEl.style.opacity = 0;
        skipEl.style.opacity = 0;
        audioNoteEl.style.opacity = 0;
      }, 6800);

      setTimeout(() => {
        goNext();
      }, 8200);
    });
  </script>
</body>
</html>
