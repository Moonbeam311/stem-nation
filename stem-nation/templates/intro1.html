<!DOCTYPE html>
<html>
<head>
  <title>Nation Builder Cinematic</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .camera {
      position: absolute;
      inset: -4%;
      background: url('/static/intro_scene1.png') center center / cover no-repeat;
      animation: slowCamera 18s ease-in-out forwards;
      transform-origin: center;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0.18), rgba(0,0,0,0.35));
      z-index: 1;
    }

    .text {
      position: absolute;
      left: 50%;
      bottom: 145px;
      transform: translateX(-50%);
      z-index: 2;
      width: min(900px, 86vw);
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.28;
      text-align: center;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 1.5s ease;
      text-shadow: 0 4px 18px rgba(0,0,0,0.9);
    }

    .btn {
      position: absolute;
      right: 34px;
      bottom: 30px;
      z-index: 3;
      padding: 13px 24px;
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 999px;
      background: rgba(0,0,0,0.62);
      color: white;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(212,175,55,0.82);
      color: black;
    }

    .audio-note {
      position: absolute;
      left: 28px;
      bottom: 34px;
      z-index: 3;
      font-size: 12px;
      opacity: 0.55;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @keyframes slowCamera {
      0% {
        transform: scale(1.04) translate3d(-1.2%, 0, 0);
      }
      50% {
        transform: scale(1.1) translate3d(1.2%, -0.8%, 0);
      }
      100% {
        transform: scale(1.14) translate3d(0.4%, -1.2%, 0);
      }
    }
  </style>
</head>

<body>
  <div class="scene" onclick="startAudio()">
    <div class="camera"></div>
    <div class="shade"></div>

    <div id="text" class="text">Every civilization begins with a decision.</div>

    <button id="btn" class="btn" onclick="next(event)">Continue</button>
    <div class="audio-note">Tap screen if audio is blocked</div>

    <audio id="audio" preload="auto">
      <source src="/static/intro1.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const textEl = document.getElementById("text");
    const btnEl = document.getElementById("btn");
    const audioEl = document.getElementById("audio");

    let audioStarted = false;

    function startAudio() {
      if (audioStarted) return;
      audioStarted = true;
      audioEl.volume = 0.72;
      audioEl.play().catch(() => {
        audioStarted = false;
      });
    }

    window.addEventListener("load", () => {
      startAudio();
      setTimeout(() => textEl.style.opacity = 1, 1200);
      setTimeout(() => btnEl.style.opacity = 1, 6200);
    });

    function next(event) {
      if (event) event.stopPropagation();
      window.location.href = "/intro2";
    }
  </script>
</body>
</html>
