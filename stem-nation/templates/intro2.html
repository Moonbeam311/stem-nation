<!DOCTYPE html>
<html>
<head>
  <title>Nation Builder Cinematic</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .camera {
      position: absolute;
      inset: -4%;
      background: url('/static/intro_scene2.jpg') center center / cover no-repeat;
      animation: slowCamera 5.8s ease-in-out forwards;
      transform-origin: center;
      z-index: 0;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.04), rgba(0,0,0,0.42)),
        linear-gradient(to top, rgba(0,0,0,0.86), rgba(0,0,0,0.16), rgba(0,0,0,0.35));
      z-index: 1;
    }

    .text {
      position: absolute;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%);
      z-index: 2;
      width: min(920px, 88vw);
      font-size: clamp(30px, 4.8vw, 52px);
      line-height: 1.18;
      text-align: center;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 0.8s ease;
      text-shadow: 0 4px 22px rgba(0,0,0,0.95);
    }

    .skip {
      position: absolute;
      right: 24px;
      bottom: 22px;
      z-index: 3;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 999px;
      background: rgba(0,0,0,0.25);
      color: rgba(255,255,255,0.68);
      font-size: 11px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.2s ease;
    }

    .skip:hover {
      background: rgba(212,175,55,0.82);
      color: black;
    }

    @keyframes slowCamera {
      0% {
        transform: scale(1.03) translate3d(-0.8%, 0.3%, 0);
      }
      50% {
        transform: scale(1.065) translate3d(0.8%, -0.4%, 0);
      }
      100% {
        transform: scale(1.09) translate3d(0.2%, -0.8%, 0);
      }
    }
  </style>
</head>

<body>
  <div class="scene">
    <div class="camera"></div>
    <div class="shade"></div>

    <div id="text" class="text">Not with answers...
but with questions.</div>

    <button id="skip" class="skip" onclick="skipNext(event)">Skip</button>
  </div>

  <script>
    const textEl = document.getElementById("text");
    const skipEl = document.getElementById("skip");

    function goNext() {
      window.location.href = "/intro3";
    }

    function skipNext(event) {
      if (event) event.stopPropagation();
      goNext();
    }

    window.addEventListener("load", () => {
      setTimeout(() => {
        textEl.style.opacity = 1;
      }, 400);

      setTimeout(() => {
        skipEl.style.opacity = 0.38;
      }, 1200);

      setTimeout(() => {
        textEl.style.opacity = 0;
        skipEl.style.opacity = 0;
      }, 3800);

      setTimeout(() => {
        goNext();
      }, 5200);
    });
  </script>
</body>
</html>
