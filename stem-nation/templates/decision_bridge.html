<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STEM Nation | Decision Bridge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- STEM_NATION_DECISION_BRIDGE_PLACEHOLDER_V1 -->
  <style>
    :root {
      --gold: #d8b85f;
      --text: #f6edd1;
      --muted: rgba(246, 237, 209, 0.72);
      --panel: rgba(0,0,0,0.48);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(216,184,95,0.16), transparent 28%),
        radial-gradient(circle at 78% 28%, rgba(51,128,87,0.18), transparent 30%),
        linear-gradient(135deg, #060807, #101810 58%, #070907);
    }

    .card {
      width: min(820px, 94vw);
      border: 1px solid rgba(216,184,95,0.26);
      border-radius: 26px;
      padding: 38px;
      text-align: center;
      background: var(--panel);
      box-shadow: 0 28px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(7px);
    }

    .kicker {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.78rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 500;
    }

    p {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.55;
      max-width: 620px;
      margin: 0 auto 26px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(216,184,95,0.42);
      border-radius: 999px;
      padding: 11px 18px;
      background: rgba(216,184,95,0.14);
      transition: 0.2s ease;
    }

    a:hover {
      background: rgba(216,184,95,0.25);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">STEM Nation System Page</div>
    <h1>Decision Bridge</h1>
    <p>This page is reserved for connecting student choices to nation-building consequences.</p>
    <div class="actions">
      <a href="/academy_transition">Return to Academy Transition</a>
      <a href="/">Return Home</a>
    </div>
  </main>
</body>
</html>
