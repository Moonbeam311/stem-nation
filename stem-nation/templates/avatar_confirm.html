<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STEM Nation | Avatar Confirmed</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(78,151,210,.26), transparent 34%),
        radial-gradient(circle at 82% 0%, rgba(244,211,94,.18), transparent 30%),
        linear-gradient(135deg, #06111f, #101d35 46%, #05080f);
      color: #f8f1dd;
      font-family: Georgia, "Times New Roman", serif;
    }

    .card {
      width: min(760px, 92vw);
      border: 1px solid rgba(244,211,94,.34);
      background:
        linear-gradient(135deg, rgba(244,211,94,.12), rgba(255,255,255,.04)),
        rgba(7,15,28,.88);
      border-radius: 32px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 26px 90px rgba(0,0,0,.45);
    }

    .kicker {
      color: rgba(244,211,94,.86);
      letter-spacing: .17em;
      text-transform: uppercase;
      font-size: .78rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    h1 {
      color: #f4d35e;
      margin: 0 0 16px;
      font-size: clamp(2.2rem, 6vw, 4.6rem);
      line-height: .95;
    }

    .portrait {
      width: min(300px, 70vw);
      aspect-ratio: 1 / 1.18;
      object-fit: cover;
      border-radius: 28px;
      border: 2px solid rgba(244,211,94,.42);
      box-shadow: 0 0 36px rgba(244,211,94,.18);
      background: rgba(0,0,0,.25);
      margin: 8px auto 16px;
      display: block;
    }

    .identity {
      font-size: 1.25rem;
      color: #fff7df;
      margin-bottom: 8px;
    }

    .line {
      color: rgba(248,241,221,.82);
      line-height: 1.55;
      margin-bottom: 22px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      text-decoration: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: 900;
      display: inline-block;
    }

    .primary {
      background: linear-gradient(135deg, #f4d35e, #d7a51e);
      color: #171006;
    }

    .secondary {
      background: rgba(255,255,255,.1);
      color: #f8f1dd;
      border: 1px solid rgba(255,255,255,.16);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Academy Identity Confirmed</div>
    <h1>This Is You</h1>

    <img id="portrait" class="portrait" src="/static/avatars/student_scout.svg" alt="Selected avatar portrait">

    <div id="identity" class="identity">Student Leader</div>
    <div id="line" class="line">
      You are ready to enter the Academy. The story begins when you step inside.
    </div>

    <div class="actions">
      <a class="primary" href="/academy_arrival">Enter Academy</a>
      <a class="secondary" href="/avatar_select">Change Avatar</a>
    </div>
  </main>

  <script>
    const saved = localStorage.getItem("stemNationAvatar");
    if (saved) {
      const avatar = JSON.parse(saved);
      const portrait = document.getElementById("portrait");
      portrait.src = avatar.portrait || avatar.fallback || "/static/avatars/student_scout.svg";
      portrait.onerror = () => {
        portrait.onerror = null;
        portrait.src = avatar.fallback || "/static/avatars/student_scout.svg";
      };
      document.getElementById("identity").textContent = `${avatar.name || "Student Leader"}`;
      document.getElementById("line").textContent = "Your Academy identity is set. When you enter, you enter as yourself.";
    }
  </script>
</body>
</html>
