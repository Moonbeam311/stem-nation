<!DOCTYPE html>
<html>
<head>
  <title>World Entry</title>

  <style>
    body {
      margin: 0;
      padding: 60px 20px;
      font-family: Arial;
      background-color: #0f172a;
      color: white;
      text-align: center;
    }

    .title {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .scene {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .question {
      font-size: 20px;
      margin-bottom: 20px;
      color: #B98B2F;
    }

    .choice {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      width: 250px;
      background-color: #B98B2F;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="title">Desert Adaptation</div>

<div class="scene">
The sun is unforgiving.<br>
Water is limited, and your people are at risk.
</div>

<div class="question">
What will you do first?
</div>

<button class="choice">Search for water</button>
<button class="choice">Ration supplies</button>
<button class="choice">Move toward unknown territory</button>

</body>
</html>
