<!DOCTYPE html>
<html>
<head>
<title>STEM Nation</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;

  background:
    linear-gradient(rgba(0,0,0,0.32), rgba(0,0,0,0.55)),
    url("/static/landing_bg.jpg") center/cover no-repeat;
}

.container {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding: 0 20px;
  box-sizing: border-box;
}

h1 {
  font-size:64px;
  margin-bottom:10px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.55);
}

.premise {
  font-size:26px;
  margin-bottom:20px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.tagline {
  font-size:16px;
  margin-bottom:50px;
  letter-spacing:2px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

button {
  width:240px;
  padding:16px;
  font-size:18px;
  border:1px solid rgba(255,255,255,0.92);
  background:rgba(0,0,0,0.22);
  color:white;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter: blur(2px);
}

button:hover {
  background:white;
  color:black;
}
</style>
</head>

<body>

<div class="container">

<h1>STEM Nation</h1>

<div class="premise">
Civilization Did Not Begin With Us
</div>

<div class="tagline">
Power • Policy • Code • Consequence
</div>

<div class="buttons">
<button onclick="go('student')">Student Experience</button>
<button onclick="go('teacher')">Educator Access</button>
<button onclick="go('simulation')">Simulation Mode</button>
<button onclick="go('partners')">Partnerships & Grants</button>
</div>

</div>

<script>
function go(type) {
  if (type === "student") window.location.href = "/intro1";
  if (type === "teacher") window.location.href = "/teacher";
  if (type === "simulation") window.location.href = "/map";
  if (type === "partners") window.location.href = "/partners";
}
</script>

</body>
</html>
