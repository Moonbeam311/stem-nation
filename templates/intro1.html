<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>STEM Nation — Intro 1</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Segoe UI, Arial, sans-serif;
}
.bg {
  width: 100%;
  height: 100%;
  background: url("/static/intro_scene1.png") center center / cover no-repeat;
  position: relative;
}
.fade {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(transparent, rgba(0,0,0,.85));
}
.text {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 34px;
  line-height: 1.4;
  opacity: 0;
  transition: opacity 1.5s ease;
  white-space: pre-line;
}
</style>
</head>
<body>
<div class="bg">
  <div class="fade"></div>
  <div id="text" class="text">Every civilization begins with a decision.</div>
</div>

<audio id="introAudio" autoplay>
  <source src="/static/intro1.mp3" type="audio/mpeg">
</audio>

<script>
const textEl = document.getElementById("text");

setTimeout(() => {
  textEl.style.opacity = "1";
}, 1200);

setTimeout(() => {
  window.location.href = "/intro2";
}, 6500);
</script>
</body>
</html>
