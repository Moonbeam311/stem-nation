<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>STEM Nation Strategic Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #111; color: #eee; }
    .top { padding: 16px 20px; }
    #map { height: calc(100vh - 120px); width: 100%; }
    .legend { padding: 0 20px 16px 20px; }
    .legend span { margin-right: 16px; }
    select, button { padding: 8px; margin-right: 8px; }
    a, a:visited { color: #8ecbff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="top">
    <a href="/dashboard">← Back to Command Center</a>
    <h1>STEM Nation Strategic Map</h1>
    <label>Active Civilization:</label>
    <select id="owner">
      {% for name in civ_names %}
        <option value="{{ name }}">{{ name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="legend">
    <span>● Green = Mississippian</span>
    <span>● Blue = Susquehannock</span>
    <span>● Gold = Inca</span>
    <span>● Red = Phoenician</span>
    <span>● Gray = Unclaimed</span>
  </div>

  <div id="map"></div>

  <script>
    const map = L.map('map').setView([25, -20], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markers = {};

    function renderTerritories(items) {
      Object.values(markers).forEach(m => map.removeLayer(m));
      items.forEach(t => {
        const marker = L.circleMarker([t.lat, t.lng], {
          radius: 10,
          color: t.color,
          fillColor: t.color,
          fillOpacity: 0.85
        }).addTo(map);

        marker.bindPopup(
          `<b>${t.name}</b><br>` +
          `Owner: ${t.owner}<br><br>` +
          `Food: ${t.value.food}<br>` +
          `Trade: ${t.value.trade}<br>` +
          `Defense: ${t.value.defense}<br><br>` +
          `Click marker to claim if unclaimed.`
        );

        marker.on('click', async () => {
          if (t.owner !== "Unclaimed") return;
          const owner = document.getElementById('owner').value;
          const res = await fetch('/claim', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({region_name: t.name, owner})
          });
          const data = await res.json();
          if (data.ok) loadTerritories();
        });

        markers[t.id] = marker;
      });
    }

    async function loadTerritories() {
      const res = await fetch('/territories');
      const data = await res.json();
      renderTerritories(data);
    }

    loadTerritories();
  </script>
</body>
</html>
