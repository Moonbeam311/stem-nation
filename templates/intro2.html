<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>STEM Nation — Intro 2</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Segoe UI, Arial, sans-serif;
}
.bg {
  width: 100%;
  height: 100%;
  background: url("/static/intro_scene2.jpg") center center / cover no-repeat;
  position: relative;
}
.fade {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(transparent, rgba(0,0,0,.85));
}
.text {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 34px;
  line-height: 1.4;
  opacity: 0;
  transition: opacity 1.5s ease;
  white-space: pre-line;
}
.btn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 28px;
  background: white;
  border: none;
  cursor: pointer;
  opacity: 0;
  transition: opacity 1.5s ease;
}
</style>
</head>
<body>
<div class="bg">
  <div class="fade"></div>
  <div id="text" class="text"></div>
  <button id="nextBtn" class="btn" onclick="goNext()">Continue</button>
</div>

<script>
const textEl = document.getElementById("text");
const btnEl = document.getElementById("nextBtn");

setTimeout(() => {
  textEl.textContent = "Not with answers…";
  textEl.style.opacity = "1";
}, 1200);

setTimeout(() => {
  textEl.style.opacity = "0";
}, 3600);

setTimeout(() => {
  textEl.textContent = "but with questions.";
  textEl.style.opacity = "1";
}, 5200);

setTimeout(() => {
  btnEl.style.opacity = "1";
}, 7600);

function goNext() {
  window.location.href = "/intro3";
}
</script>
</body>
</html>
