<!DOCTYPE html>
<html>
<head>
  <title>The Academy — Decision</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      opacity: 1;
      transition: opacity 2s ease;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .line {
      font-size: 28px;
      margin: 10px;
      opacity: 0;
      transition: opacity 1.5s;
      max-width: 920px;
      line-height: 1.45;
    }
  </style>
</head>

<body>

<div class="container">
  <div id="l1" class="line">You have observed.</div>
  <div id="l2" class="line">You have learned how to think.</div>
  <div id="l3" class="line">You understand the role of the individual.</div>
  <div id="l4" class="line">Now, you will be required to decide.</div>
  <div id="l5" class="line">Every decision carries consequence.</div>
</div>

<script>
const lines = ["l1","l2","l3","l4","l5"];

lines.forEach((id, i) => {
  setTimeout(() => {
    document.getElementById(id).style.opacity = 1;
  }, i * 2000);
});
</script>

</body>
</html>
