<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>STEM Nation — World Entry</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<div id="screen" style="
width:100vw;
height:100vh;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
position:relative;
">
  <div style="
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  ">
    <button onclick="goNext()" style="
    padding:14px 30px;
    font-size:18px;
    background:rgba(0,0,0,0.7);
    color:white;
    border:1px solid #cbbda2;
    cursor:pointer;
    ">
    Continue
    </button>
  </div>
</div>

<script>
const selectedWorld = localStorage.getItem("selectedWorld") || "river";

const worldImages = {
  river: "/river.png",
  forest: "/forestt.jpg",
  mountain: "/world_mountain.jpg",
  desert: "/desert.jpg",
  coastal: "/coastal.jpg",
  balanced: "/balanced.jpg"
};

document.getElementById("screen").style.backgroundImage =
  "url('" + (worldImages[selectedWorld] || "/river.png") + "')";

function goNext() {
  window.location.href = "/module0_regions.html";
}
</script>

</body>
</html>
